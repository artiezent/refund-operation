<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daily KPI Dashboard</title>
    <link rel="stylesheet" href="styles.css">
    <style>
        body { margin: 0; background: #f5f7fa; overflow: hidden; }

        .dashboard-wrap { display: none; flex-direction: column; height: 100vh; }

        .iframe-container { flex: 1; position: relative; overflow: hidden; }
        .iframe-container iframe {
            position: absolute; top: 0; left: 0;
            width: 100%; height: 100%;
            border: none; background: #fff;
            opacity: 0; pointer-events: none;
            transition: opacity 0.15s;
        }
        .iframe-container iframe.active { opacity: 1; pointer-events: auto; }

        .tab-bar {
            display: flex; align-items: stretch;
            background: #1e293b; padding: 0;
            border-bottom: 1px solid #334155;
            flex-shrink: 0; height: 40px;
        }
        .tab-item {
            display: flex; align-items: center; gap: 6px;
            padding: 0 20px;
            background: #1e293b; color: #94a3b8;
            border: none; border-right: 1px solid #334155;
            cursor: pointer; font-size: 13px; font-weight: 500;
            transition: all 0.15s; white-space: nowrap;
        }
        .tab-item:hover { background: #334155; color: #e2e8f0; }
        .tab-item.active { background: #fff; color: #1e293b; font-weight: 600; }
        .tab-dot {
            width: 8px; height: 8px; border-radius: 50%;
            flex-shrink: 0;
        }
        .tab-item .loading-spinner {
            width: 10px; height: 10px;
            border: 2px solid #475569; border-top-color: #818cf8;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <!-- 로그인 게이트 -->
    <div id="auth-gate" class="auth-gate">
        <div class="auth-card">
            <div class="auth-logo">Daily KPI</div>
            <p class="auth-desc">접속하려면 비밀번호를 입력해주세요.</p>
            <div class="auth-form">
                <input type="password" id="auth-password" class="auth-input" placeholder="비밀번호" autocomplete="off" onkeydown="if(event.key==='Enter')handleLogin()">
                <button class="auth-btn" onclick="handleLogin()">로그인</button>
            </div>
            <div id="auth-error" class="auth-error" style="display:none;"></div>
        </div>
    </div>

    <!-- 대시보드 (인증 후 표시) -->
    <div id="dashboard" class="dashboard-wrap">
        <div class="tab-bar" id="tabBar">
            <button class="tab-item active" data-tab="conversion" onclick="switchTab('conversion')">
                <span class="tab-dot" style="background:#818cf8;"></span>
                <span>전환파트</span>
            </button>
            <button class="tab-item" data-tab="payment" onclick="switchTab('payment')">
                <span class="tab-dot" style="background:#22c55e;"></span>
                <span>결제파트</span>
            </button>
            <button class="tab-item" data-tab="payment-yearly" onclick="switchTab('payment-yearly')">
                <span class="tab-dot" style="background:#f59e0b;"></span>
                <span>결제파트 누적</span>
            </button>
            <button class="tab-item" data-tab="collection" onclick="switchTab('collection')">
                <span class="tab-dot" style="background:#ef4444;"></span>
                <span>추심</span>
            </button>
            <button class="tab-item" data-tab="coverage" onclick="switchTab('coverage')">
                <span class="tab-dot" style="background:#06b6d4;"></span>
                <span>결제콜 커버리지</span>
            </button>
        </div>
        <div class="iframe-container" id="iframeContainer">
            <iframe src="conversion.html" data-tab="conversion" class="active"></iframe>
            <iframe src="payment.html" data-tab="payment"></iframe>
            <iframe src="payment-yearly.html" data-tab="payment-yearly"></iframe>
            <iframe src="collection.html" data-tab="collection"></iframe>
            <iframe src="coverage.html" data-tab="coverage"></iframe>
        </div>
    </div>

    <script>
    const AUTH_HASH = 'e4ea996fd5ff4cb8fd04f92c2e807c3ddded3d85874006b3c16c15c18fc3b198';
    const AUTH_SESSION_KEY = 'kpi_authenticated';

    async function sha256(message) {
        const msgBuffer = new TextEncoder().encode(message);
        const hashBuffer = await crypto.subtle.digest('SHA-256', msgBuffer);
        return Array.from(new Uint8Array(hashBuffer)).map(b => b.toString(16).padStart(2, '0')).join('');
    }

    async function handleLogin() {
        const input = document.getElementById('auth-password');
        const errorEl = document.getElementById('auth-error');
        const password = input.value.trim();

        if (!password) {
            errorEl.textContent = '비밀번호를 입력해주세요.';
            errorEl.style.display = 'block';
            input.focus();
            return;
        }

        const hash = await sha256(password);
        if (hash === AUTH_HASH) {
            sessionStorage.setItem(AUTH_SESSION_KEY, 'true');
            showDashboard();
        } else {
            errorEl.textContent = '비밀번호가 올바르지 않습니다.';
            errorEl.style.display = 'block';
            input.value = '';
            input.focus();
        }
    }

    function showDashboard() {
        document.getElementById('auth-gate').style.display = 'none';
        document.getElementById('dashboard').style.display = 'flex';
        trackLoading();
    }

    function switchTab(tabId) {
        document.querySelectorAll('.iframe-container iframe').forEach(f => f.classList.remove('active'));
        document.querySelectorAll('.tab-bar .tab-item').forEach(b => b.classList.remove('active'));

        const iframe = document.querySelector(`iframe[data-tab="${tabId}"]`);
        const btn = document.querySelector(`.tab-item[data-tab="${tabId}"]`);
        if (iframe) iframe.classList.add('active');
        if (btn) btn.classList.add('active');
    }

    function trackLoading() {
        document.querySelectorAll('.iframe-container iframe').forEach(iframe => {
            const tab = iframe.dataset.tab;
            const btn = document.querySelector(`.tab-item[data-tab="${tab}"]`);
            const dot = btn.querySelector('.tab-dot');
            const origColor = dot.style.background;

            dot.outerHTML = '<span class="loading-spinner"></span>';

            iframe.addEventListener('load', () => {
                const spinner = btn.querySelector('.loading-spinner');
                if (spinner) spinner.outerHTML = `<span class="tab-dot" style="background:${origColor};"></span>`;
            }, { once: true });
        });
    }

    if (sessionStorage.getItem(AUTH_SESSION_KEY) === 'true') {
        showDashboard();
    }
    </script>
</body>
</html>
